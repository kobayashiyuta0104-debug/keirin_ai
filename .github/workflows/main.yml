name: Keirin Daily Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    # 日本時間02:00
    - cron: '0 17 * * *'

    # 日本時間04:00
    - cron: '0 19 * * *'

    # 日本時間08:00
    - cron: '0 23 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ======================================================
      # データ取得
      # ======================================================

      - name: Run 001
        run: python official_program/001_collect_yesterday_player.py

      - name: Run 002
        run: python official_program/002_collect_yesterday_result.py

      - name: Run 006
        run: python official_program/006_collect_yesterday_race_data.py

      - name: Run 011
        run: python official_program/011_collect_daily_oddspark_html.py

      - name: Run 012
        run: python official_program/012_build_daily_lines_json.py

      # ======================================================
      # CSV出力
      # ======================================================

      - name: Run 003
        run: python official_program/003_export_player_csv.py

      - name: Run 004
        run: python official_program/004_export_result_csv.py

      - name: Run 007
        run: python official_program/007_export_race_csv.py

      - name: Run 013
        run: python official_program/013_export_daily_lines_csv.py

      

      # ======================================================
      # 14日以前のJSON削除
      # ======================================================

      - name: Delete JSON older than 14 days
        run: |
          python << 'EOF'
          from pathlib import Path
          from datetime import datetime, timedelta

          daily_dir = Path("data_official/daily")

          if daily_dir.exists():

              cutoff = datetime.now() - timedelta(days=14)

              for file in daily_dir.rglob("*.json"):
                  try:
                      date_text = file.name.split("_")[0]
                      file_date = datetime.strptime(date_text, "%Y%m%d")

                      if file_date < cutoff:
                          print(f"Delete: {file}")
                          file.unlink()

                  except Exception:
                      pass
          EOF

      # ======================================================
      # GitHubへ反映
      # ======================================================

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add csv/
          git add data_official/daily/

          if ! git diff --cached --quiet; then
            git commit -m "Auto update daily data"

            git pull --rebase origin main

            git push origin main
          else
            echo "No changes"
          fi